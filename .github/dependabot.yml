version: 2
updates:
  - package-ecosystem: pub
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      dart-deps:
        patterns:
          - "*"
    ignore:
      - dependency-name: file_picker
        versions: [">=11.0.0"]
    labels:
      - dependencies
      - dart

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
