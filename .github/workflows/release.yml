name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 tag（留空则不创建 tag，如 v1.0.0）'
        required: false
        type: string
      build-linux:
        description: 'Linux (x86_64)'
        type: boolean
        default: true
      build-macos-arm64:
        description: 'macOS (Apple Silicon / arm64)'
        type: boolean
        default: true
      build-macos-x64:
        description: 'macOS (Intel / x86_64)'
        type: boolean
        default: false
      build-windows:
        description: 'Windows (x86_64)'
        type: boolean
        default: true
      build-android:
        description: 'Android (arm64-v8a, armeabi-v7a, x86_64)'
        type: boolean
        default: true
      build-ios:
        description: 'iOS (arm64, 未签名)'
        type: boolean
        default: false
      build-web:
        description: 'Web'
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tag:
    name: Create Tag
    runs-on: ubuntu-latest
    if: ${{ inputs.version != '' }}
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Create and push tag
        id: tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          if git rev-parse "${{ inputs.version }}" >/dev/null 2>&1; then
            echo "Tag ${{ inputs.version }} already exists, skipping."
          else
            git tag -a "${{ inputs.version }}" -m "Release ${{ inputs.version }}"
            git push origin "${{ inputs.version }}"
          fi
          echo "tag=${{ inputs.version }}" >> $GITHUB_OUTPUT

  build-linux:
    name: Linux-x86_64
    if: ${{ inputs.build-linux && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - run: flutter pub get
      - run: flutter build linux --release
      - uses: actions/upload-artifact@v7
        with:
          name: oboeru-linux-x86_64
          path: build/linux/x64/release/bundle/
          retention-days: 7

  build-macos-arm64:
    name: macOS-arm64
    if: ${{ inputs.build-macos-arm64 && !cancelled() }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build macos --release
      - uses: actions/upload-artifact@v7
        with:
          name: oboeru-macos-arm64
          path: build/macos/Build/Products/Release/
          retention-days: 7

  build-macos-x64:
    name: macOS-x86_64
    if: ${{ inputs.build-macos-x64 && !cancelled() }}
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build macos --release
      - uses: actions/upload-artifact@v7
        with:
          name: oboeru-macos-x86_64
          path: build/macos/Build/Products/Release/
          retention-days: 7

  build-windows:
    name: Windows-x86_64
    if: ${{ inputs.build-windows && !cancelled() }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v7
        with:
          name: oboeru-windows-x86_64
          path: build/windows/x64/runner/Release/
          retention-days: 7

  build-android:
    name: Android
    if: ${{ inputs.build-android && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter clean
      - name: Setup keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/upload-keystore.jks
            printf '%s\n' \
              'storeFile=../upload-keystore.jks' \
              "storePassword=$KEYSTORE_PASSWORD" \
              "keyAlias=$KEY_ALIAS" \
              "keyPassword=$KEY_PASSWORD" \
              > android/key.properties
          fi
      - run: flutter pub get
      - run: flutter build apk --release --split-per-abi
      - name: Upload arm64-v8a
        uses: actions/upload-artifact@v7
        with:
          name: oboeru-android-arm64-v8a
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 7
      - name: Upload armeabi-v7a
        uses: actions/upload-artifact@v7
        with:
          name: oboeru-android-armeabi-v7a
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          retention-days: 7
      - name: Upload x86_64
        uses: actions/upload-artifact@v7
        with:
          name: oboeru-android-x86_64
          path: build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 7

  build-ios:
    name: iOS-arm64
    if: ${{ inputs.build-ios && !cancelled() }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      - uses: actions/upload-artifact@v7
        with:
          name: oboeru-ios-arm64
          path: build/ios/iphoneos/
          retention-days: 7

  build-web:
    name: Web
    if: ${{ inputs.build-web && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build web --release
      - uses: actions/upload-artifact@v7
        with:
          name: oboeru-web
          path: build/web/
          retention-days: 7

  release:
    name: Create Release
    if: ${{ always() && inputs.version != '' && !cancelled() }}
    needs: [build-linux, build-macos-arm64, build-macos-x64, build-windows, build-android, build-ios, build-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8

      - name: Package artifacts
        run: |
          mkdir -p dist
          if [ -d "oboeru-linux-x86_64" ]; then
            tar czf dist/oboeru-linux-x86_64.tar.gz -C oboeru-linux-x86_64 .
          fi
          if [ -d "oboeru-macos-arm64" ]; then
            tar czf dist/oboeru-macos-arm64.tar.gz -C oboeru-macos-arm64 .
          fi
          if [ -d "oboeru-macos-x86_64" ]; then
            tar czf dist/oboeru-macos-x86_64.tar.gz -C oboeru-macos-x86_64 .
          fi
          if [ -d "oboeru-windows-x86_64" ]; then
            (cd oboeru-windows-x86_64 && zip -9qr ../dist/oboeru-windows-x86_64.zip .)
          fi
          if [ -d "oboeru-android-arm64-v8a" ]; then
            cp oboeru-android-arm64-v8a/*.apk dist/ 2>/dev/null || true
          fi
          if [ -d "oboeru-android-armeabi-v7a" ]; then
            cp oboeru-android-armeabi-v7a/*.apk dist/ 2>/dev/null || true
          fi
          if [ -d "oboeru-android-x86_64" ]; then
            cp oboeru-android-x86_64/*.apk dist/ 2>/dev/null || true
          fi
          if [ -d "oboeru-ios-arm64" ]; then
            tar czf dist/oboeru-ios-arm64.tar.gz -C oboeru-ios-arm64 .
          fi
          if [ -d "oboeru-web" ]; then
            tar czf dist/oboeru-web.tar.gz -C oboeru-web .
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: Release ${{ inputs.version }}
          body: |
            ## Oboeru ${{ inputs.version }}

            智能背单词 — AI 例句生成 + TTS 语音 + 跨平台。

            | 平台 | 架构 | 文件 |
            |------|------|------|
            | Linux | x86_64 | `oboeru-linux-x86_64.tar.gz` |
            | macOS | arm64 (Apple Silicon) | `oboeru-macos-arm64.tar.gz` |
            | macOS | x86_64 (Intel) | `oboeru-macos-x86_64.tar.gz` |
            | Windows | x86_64 | `oboeru-windows-x86_64.zip` |
            | Android | arm64-v8a | `app-arm64-v8a-release.apk` |
            | Android | armeabi-v7a | `app-armeabi-v7a-release.apk` |
            | Android | x86_64 | `app-x86_64-release.apk` |
            | iOS | arm64 | `oboeru-ios-arm64.tar.gz` (未签名) |
            | Web | - | `oboeru-web.tar.gz` |
          draft: false
          prerelease: false
          files: |
            dist/*
