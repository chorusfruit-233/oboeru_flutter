name: Build All Platforms

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart analyze
      - run: flutter test

  build-linux:
    name: Linux
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - run: flutter pub get
      - run: flutter build linux --release
      - uses: actions/upload-artifact@v7
        with:
          name: oboeru-linux
          path: build/linux/x64/release/bundle/
          retention-days: 30

  build-macos:
    name: macOS
    needs: analyze
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build macos --release
      - uses: actions/upload-artifact@v7
        with:
          name: oboeru-macos
          path: build/macos/Build/Products/Release/
          retention-days: 30

  build-windows:
    name: Windows
    needs: analyze
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v7
        with:
          name: oboeru-windows
          path: build/windows/x64/runner/Release/
          retention-days: 30

  build-android:
    name: Android
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter clean
      - run: rm -f android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v7
        with:
          name: oboeru-android
          path: build/app/outputs/flutter-apk/
          retention-days: 30

  build-ios:
    name: iOS
    needs: analyze
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      - uses: actions/upload-artifact@v7
        with:
          name: oboeru-ios
          path: build/ios/iphoneos/
          retention-days: 30

  build-web:
    name: Web
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build web --release
      - uses: actions/upload-artifact@v7
        with:
          name: oboeru-web
          path: build/web/
          retention-days: 30
