name: oboeru_flutter
description: A Flutter vocabulary learning app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.5.5
  path_provider: ^2.1.6
  file_picker: ">=10.0.0 <11.0.0"
  intl: ^0.20.3
  http: ^1.6.0
  flutter_tts: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sample_vocabulary.txt
    - assets/sample_vocabulary.json
